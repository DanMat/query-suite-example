name: Bug report
description: Report a defect so it can be fixed
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or a code snippet that reproduces the issue.
      render: ts
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 0.1.2
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: e.g. Node 20.17, Deno 2.1, Cloudflare Workers, Chrome 140
    validations:
      required: true
